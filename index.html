<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REF-BAU App</title>
    
    <!-- VERSUCH 1: ERSATZ-SERVER (UNPKG) -->
    <script src="https://unpkg.com"></script>
    
    <!-- VERSUCH 2: FALLBACK (JSDELIVR) -->
    <script src="https://cdn.jsdelivr.net"></script>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4">

    <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg p-6 border-t-4 border-blue-900 text-center">
        <div class="text-3xl font-black text-blue-900 italic mb-6 border-b pb-4">REF-BAU</div>

        <div id="statusBox" class="mb-4 p-3 rounded-lg bg-yellow-100 text-yellow-800 font-bold text-[10px] uppercase tracking-widest">
            System wird initialisiert...
        </div>

        <div id="loginSection" class="hidden space-y-4">
            <input type="email" id="email" placeholder="E-Mail" class="w-full border p-3 rounded shadow-sm">
            <input type="password" id="password" placeholder="Passwort" class="w-full border p-3 rounded shadow-sm">
            <button onclick="handleLogin()" id="btn" class="w-full bg-blue-900 text-white py-3 rounded font-bold uppercase shadow-lg">Anmelden</button>
        </div>

        <div id="appSection" class="hidden space-y-4">
            <div class="bg-green-100 text-green-800 p-2 rounded text-xs font-bold uppercase">System Bereit ✅</div>
            <input type="text" id="project" placeholder="Projekt Name" class="w-full border p-3 rounded">
            <button onclick="senden()" id="sendBtn" class="w-full bg-green-600 text-white py-4 rounded font-bold uppercase shadow-xl">Bericht Senden</button>
        </div>
    </div>

    <script>
        // === DEINE DATEN (HIER EINTRAGEN!) ===
        const URL = 'https://hvvuzldppehewkotppdz.supabase.co'; 
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2dnV6bGRwcGVoZXdrb3RwcGR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MDgwOTYsImV4cCI6MjA5MDE4NDA5Nn0.KJXLoRLvPd7mRoQu9lTRhuxdwAwUhXov9kbwGkVhV_M';
        
        let sb;

        // NOTFALL-LADER: Wir laden die Bibliothek manuell ins System
        function loadLib() {
            const script = document.createElement('script');
            script.src = "https://unpkg.com";
            script.async = true;
            script.onload = () => {
                console.log("Bibliothek geladen!");
                startSystem();
            };
            script.onerror = () => {
                document.getElementById('statusBox').innerText = "NETZWERK-BLOCKADE! (WLAN AUSSCHALTEN)";
                document.getElementById('statusBox').className = "mb-4 p-3 rounded-lg bg-red-100 text-red-800 font-bold text-[10px] uppercase";
            };
            document.head.appendChild(script);
        }

        function startSystem() {
            try {
                sb = supabase.createClient(URL, KEY);
                document.getElementById('statusBox').innerText = "Bereit für Login ✅";
                document.getElementById('statusBox').className = "mb-4 p-3 rounded-lg bg-green-100 text-green-800 font-bold text-[10px] uppercase";
                document.getElementById('loginSection').classList.remove('hidden');
                checkSession();
            } catch (e) {
                document.getElementById('statusBox').innerText = "KONFIGURATIONS-FEHLER!";
            }
        }

        async function handleLogin() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            const { error } = await sb.auth.signInWithPassword({ email: e, password: p });
            if (error) alert("Fehler: " + error.message);
            else checkSession();
        }

        async function checkSession() {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('statusBox').classList.add('hidden');
                document.getElementById('appSection').classList.remove('hidden');
            }
        }

        async function senden() {
            const p = document.getElementById('project').value;
            const { error } = await sb.from('berichte').insert([{ projekt: p }]);
            if (error) alert(error.message);
            else { alert("Gesendet!"); location.reload(); }
        }

        // Startvorgang
        loadLib();
    </script>
</body>
</html>
