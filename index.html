<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REF-BAU App</title>

    <!-- VERSUCH 1: ERSATZ-SERVER (UNPKG) -->
    <script src="https://unpkg.com"></script>
    
    <!-- VERSUCH 2: FALLBACK (JSDELIVR) -->
    <script src="https://cdn.jsdelivr.net"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com"></script>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg p-6 border-t-4 border-blue-900">
        <div class="flex items-center justify-between mb-6 border-b pb-4">
            <div class="text-3xl font-black text-blue-900 italic tracking-tighter">REF-BAU</div>
        </div>

        <div id="loginSection" class="space-y-4 text-center">
            <h2 class="font-bold text-gray-700 uppercase tracking-widest">Mitarbeiter Login</h2>
            <input type="email" id="loginEmail" placeholder="E-Mail" class="w-full border-2 p-3 rounded-lg outline-none focus:border-blue-900">
            <input type="password" id="loginPassword" placeholder="Passwort" class="w-full border-2 p-3 rounded-lg outline-none focus:border-blue-900">
            <button onclick="handleLogin()" id="loginBtn" class="w-full bg-blue-900 text-white py-4 rounded-xl font-bold shadow-lg">Anmelden</button>
            
            <!-- HIER ZEIGT DIE APP DEN STATUS AN -->
            <p id="initMsg" class="mt-4 text-[10px] font-bold py-2 px-4 rounded bg-gray-50 uppercase tracking-widest transition-all duration-500">Prüfe Cloud-Module...</p>
        </div>

        <div id="appSection" class="hidden space-y-4">
            <input type="text" id="project" class="w-full border p-2 rounded" placeholder="Baustelle">
            <button onclick="saveAndSend()" id="sendBtn" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold">Bericht senden</button>
            <button onclick="handleLogout()" class="w-full text-xs text-gray-400 mt-8 underline">Abmelden</button>
        </div>
    </div>

    <script>
        // === ZUGANGSDATEN (HIER EINTRAGEN!) ===
        const URL = 'https://hvvuzldppehewkotppdz.supabase.co'; 
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2dnV6bGRwcGVoZXdrb3RwcGR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MDgwOTYsImV4cCI6MjA5MDE4NDA5Nn0.KJXLoRLvPd7mRoQu9lTRhuxdwAwUhXov9kbwGkVhV_M';
        
        let sb = null;

        window.onload = async function() {
            const msg = document.getElementById('initMsg');
            
            // 1. PRÜFUNG: Ist die Bibliothek geladen?
            if (typeof supabase === 'undefined') {
                msg.innerText = "❌ KRITISCH: BIBLIOTHEK NICHT GEFUNDEN!";
                msg.style.color = "red";
                msg.style.backgroundColor = "#fee2e2";
                return;
            }

            try {
                // 2. INITIALISIERUNG
                sb = supabase.createClient(URL, KEY);
                
                // 3. ERFOLGSMELDUNG
                msg.innerText = "✅ SYSTEM BEREIT";
                msg.style.color = "green";
                msg.style.backgroundColor = "#dcfce7";
                
                await checkSession();
            } catch (err) {
                msg.innerText = "❌ FEHLER: " + err.message;
                msg.style.color = "red";
            }
        };

        async function handleLogin() {
            if (!sb) { alert("System lädt noch..."); return; }
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            btn.innerText = "Prüfe..."; btn.disabled = true;

            try {
                const { error } = await sb.auth.signInWithPassword({ email, password });
                if (error) throw error;
                await checkSession();
            } catch (err) {
                alert("Login-Fehler: " + err.message);
                btn.innerText = "Anmelden"; btn.disabled = false;
            }
        }

        async function checkSession() {
            if (!sb) return;
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('appSection').classList.remove('hidden');
            }
        }

        async function handleLogout() {
            if(sb) await sb.auth.signOut();
            location.reload();
        }
    </script>
</body>
</html>
