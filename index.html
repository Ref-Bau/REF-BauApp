<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REF-BAU App</title>
    <!-- Wir nutzen einen anderen, oft schnelleren Server -->
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 text-center">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg p-6 border-t-4 border-blue-900">
        <div class="text-3xl font-black text-blue-900 italic mb-6">REF-BAU</div>
        <div id="status" class="p-3 bg-red-100 text-red-700 font-bold rounded mb-4 uppercase text-[10px]">Verbindung wird gesucht...</div>
        
        <div id="loginForm" class="hidden space-y-4">
            <input type="email" id="email" placeholder="E-Mail" class="w-full border p-3 rounded">
            <input type="password" id="password" placeholder="Passwort" class="w-full border p-3 rounded">
            <button onclick="doLogin()" class="w-full bg-blue-900 text-white py-3 rounded font-bold uppercase">Anmelden</button>
        </div>
    </div>

   <script>
    // === DEINE DATEN (HIER EINTRAGEN!) ===
    const URL = 'https://hvvuzldppehewkotppdz.supabase.co'; 
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2dnV6bGRwcGVoZXdrb3RwcGR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MDgwOTYsImV4cCI6MjA5MDE4NDA5Nn0.KJXLoRLvPd7mRoQu9lTRhuxdwAwUhXov9kbwGkVhV_M';
    
    let sb;

    // Wir versuchen die Verbindung sofort und ohne Umwege
    try {
        // Falls die normale Bibliothek blockiert wird, nutzen wir das Fenster-Objekt
        const supabaseClient = window.supabase ? window.supabase.createClient : null;
        
        if (supabaseClient) {
            sb = supabaseClient(URL, KEY);
            console.log("REF-BAU: Direktverbindung aufgebaut.");
            
            // Status-Anzeige auf der Seite aktualisieren
            window.addEventListener('load', () => {
                const status = document.getElementById('status');
                if(status) {
                    status.innerText = "System bereit ✅";
                    status.className = "p-3 bg-green-100 text-green-700 font-bold rounded mb-4 uppercase text-[10px]";
                    document.getElementById('loginForm').classList.remove('hidden');
                }
            });
        }
    } catch (e) {
        alert("Kritischer Netzwerkfehler: " + e.message);
    }

    async function doLogin() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        const { error } = await sb.auth.signInWithPassword({email: e, password: p});
        if (error) alert("Login fehlgeschlagen: " + error.message);
        else {
            alert("Erfolg! Willkommen bei REF-BAU.");
            // Hier das Formular anzeigen
        }
    }
</script>

</body>
</html>
