<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>REF-Bau App | Lokal-Modus</title>
    <!-- LÄDT DIE DATEI AUS DEINEM ORDNER -->
    <script src="supabase.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid #27ae60; }
        #status { font-size: 12px; padding: 10px; margin-bottom: 15px; border-radius: 6px; text-align: center; background: #eee; font-weight: bold; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div id="status">🔍 Suche lokale supabase.js...</div>
    <h2>🏗️ REF-Bau Login</h2>
    <div id="login-form">
        <input type="email" id="email" placeholder="E-Mail">
        <input type="password" id="pass" placeholder="Passwort">
        <button id="login-btn">JETZT ANMELDEN</button>
    </div>
    <div id="app-content" class="hidden">
        <h3 style="color: #27ae60;">✅ System bereit</h3>
        <button onclick="location.reload()">Abmelden</button>
    </div>
</div>

<script>
    const URL = 'https://oqrkfeivpgqzgecbuzha.supabase.co'; 
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xcmtmZWl2cGdxemdlY2J1emhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2ODM1ODEsImV4cCI6MjA5MDI1OTU4MX0.Cue9gAHGEvnJTdF0ZLtYp0wGkCOnnxDheHBjmDhc3nA';

    let supabaseClient = null;
    const statusBox = document.getElementById('status');

    function init() {
        if (window.supabase) {
            supabaseClient = window.supabase.createClient(URL, KEY);
            statusBox.innerText = "🚀 System bereit (Lokal geladen)";
            statusBox.style.background = "#d4edda";
        } else {
            statusBox.innerText = "❌ FEHLER: supabase.js nicht im Ordner gefunden!";
            statusBox.style.background = "#f8d7da";
        }
    }

    document.getElementById('login-btn').addEventListener('click', async () => {
        if (!supabaseClient) return alert("System nicht bereit!");
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('pass').value;
        
        statusBox.innerText = "⏳ Prüfe Login...";
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

        if (error) {
            alert("Fehler: " + error.message);
            statusBox.innerText = "❌ " + error.message;
        } else {
            statusBox.innerText = "✅ Willkommen!";
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
        }
    });

    window.onload = init;
</script>
</body>
</html>
