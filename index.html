<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REF-Bau App | Fotos & Zeit</title>
    <style>
        :root { --green: #27ae60; --dark: #2c3e50; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 10px; }
        .card { background: white; width: 100%; max-width: 450px; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 5px solid var(--green); }
        h2 { text-align: center; color: var(--dark); margin: 0 0 15px 0; }
        label { display: block; margin-top: 12px; font-weight: bold; color: #555; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .flex-row { display: flex; gap: 10px; }
        .flex-row div { flex: 1; }
        button { width: 100%; padding: 15px; background: var(--green); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 15px; }
        #status-box { font-size: 13px; padding: 12px; margin-bottom: 15px; border-radius: 8px; text-align: center; background: #e8f5e9; color: #2e7d32; font-weight: bold; }
        .hidden { display: none; }
        .info-text { font-size: 12px; color: #666; margin-top: 5px; font-style: italic; }
        .photo-preview { display: flex; gap: 5px; margin-top: 10px; overflow-x: auto; }
        .photo-preview img { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="card">
    <div id="status-box">🚀 REF-Bau bereit</div>
    <h2>🏗️ Tagesbericht</h2>

    <!-- LOGIN -->
    <div id="login-form">
        <label>E-Mail</label>
        <input type="email" id="email" placeholder="name@ref-bau.de">
        <label>Passwort</label>
        <input type="password" id="pass" placeholder="••••••••">
        <button id="login-btn">ANMELDEN</button>
    </div>

    <!-- HAUPT FORMULAR -->
    <div id="app-content" class="hidden">
        <label>Projekt</label>
        <select id="projekt-select">
            <option value="Neubau Berlin-Mitte">Neubau Berlin-Mitte</option>
            <option value="Sanierung Schule West">Sanierung Schule West</option>
            <option value="Kita Sonnenstrahl">Kita Sonnenstrahl</option>
        </select>

        <div class="flex-row">
            <div>
                <label>Start</label>
                <input type="time" id="start-zeit" value="07:00" onchange="berechneStunden()">
            </div>
            <div>
                <label>Ende</label>
                <input type="time" id="end-zeit" value="16:30" onchange="berechneStunden()">
            </div>
        </div>
        <div class="info-text" id="stunden-info">Netto: 8.50h (inkl. 1h Pause)</div>

        <label>Fotos aufnehmen</label>
        <input type="file" id="foto-input" accept="image/*" multiple style="padding: 5px;">
        <div id="preview" class="photo-preview"></div>

        <label>Bericht</label>
        <textarea id="bericht" rows="3" placeholder="Was wurde heute gemacht?"></textarea>

        <div id="gps-display" style="font-size: 11px; color: #888; margin-top: 10px;">📍 GPS: Suche Standort...</div>

        <button id="send-report-btn">BERICHT & FOTOS SENDEN</button>
        <button onclick="location.reload()" style="background:#888; font-size:12px; margin-top:10px;">Abmelden</button>
    </div>
</div>

<script>
    const URL = 'https://oqrkfeivpgqzgecbuzha.supabase.co'; 
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xcmtmZWl2cGdxemdlY2J1emhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2ODM1ODEsImV4cCI6MjA5MDI1OTU4MX0.Cue9gAHGEvnJTdF0ZLtYp0wGkCOnnxDheHBjmDhc3nA';

    let userCoords = "Unbekannt";
    let nettoStunden = 8.5;

    // GPS
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(p => {
            userCoords = `${p.coords.latitude.toFixed(5)}, ${p.coords.longitude.toFixed(5)}`;
            document.getElementById('gps-display').innerText = "📍 GPS: Aktiv (" + userCoords + ")";
        });
    }

    // STUNDEN
    function berechneStunden() {
        const s = document.getElementById('start-zeit').value.split(':');
        const e = document.getElementById('end-zeit').value.split(':');
        const diff = (parseInt(e[0])*60 + parseInt(e[1])) - (parseInt(s[0])*60 + parseInt(s[1]));
        nettoStunden = ((diff - 60) / 60).toFixed(2);
        document.getElementById('stunden-info').innerText = `Netto: ${nettoStunden}h (1h Pause abgezogen)`;
    }

    // LOGIN
    async function startLogin() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('pass').value;
        const response = await fetch(`${URL}/auth/v1/token?grant_type=password`, {
            method: 'POST', headers: { 'apikey': KEY, 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        if (response.ok) {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            berechneStunden();
        } else { alert("Login fehlgeschlagen!"); }
    }

    // BERICHT & FOTOS SENDEN
    async function sendReport() {
        const statusBox = document.getElementById('status-box');
        const fotoFiles = document.getElementById('foto-input').files;
        const projekt = document.getElementById('projekt-select').value;
        const datum = new Date().toISOString().split('T')[0];

        statusBox.innerText = "⏳ Verarbeite Bericht...";

        try {
            // 1. Fotos hochladen
            for (let file of fotoFiles) {
                const path = `bau-fotos/${projekt}/${datum}/${Date.now()}_${file.name}`;
                await fetch(`${URL}/storage/v1/object/bau-fotos/${path}`, {
                    method: 'POST',
                    headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` },
                    body: file
                });
            }

            // 2. Textbericht speichern
            const payload = {
                projekt_name: projekt,
                arbeitsstunden: parseFloat(nettoStunden),
                bericht_text: document.getElementById('bericht').value,
                gps_coords: userCoords
            };

            const response = await fetch(`${URL}/rest/v1/tagesberichte`, {
                method: 'POST',
                headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                statusBox.innerText = "✅ Alles gespeichert!";
                alert("Bericht und Fotos wurden erfolgreich übertragen.");
                location.reload();
            }
        } catch (e) { alert("Fehler: " + e.message); }
    }

    document.getElementById('login-btn').addEventListener('click', startLogin);
    document.getElementById('send-report-btn').addEventListener('click', sendReport);
</script>

</body>
</html>


// Bilder

<div id="admin-area" class="card" style="margin-top:20px; max-width: 800px;">
    <h3>📊 Admin-Kontrolle: Berichte & Fotos</h3>
    <button onclick="ladeBerichte()">🔄 Liste aktualisieren</button>
    
    <div id="berichte-galerie" style="margin-top:20px;">
        <!-- Hier erscheinen die Berichte -->
    </div>
</div>

<script>
async function ladeBerichte() {
    const galerie = document.getElementById('berichte-galerie');
    galerie.innerHTML = "⌛ Lade Daten...";

    try {
        // 1. Berichte aus der Datenbank holen
        const response = await fetch(`${URL}/rest/v1/tagesberichte?select=*&order=datum.desc`, {
            method: 'GET',
            headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` }
        });
        const berichte = await response.json();

        galerie.innerHTML = ""; // Container leeren

        for (const b of berichte) {
            const div = document.createElement('div');
            div.className = "bericht-eintrag";
            div.style = "border:1px solid #ccc; padding:15px; margin-bottom:15px; border-radius:10px; background:#fff;";
            
            // 2. Bilder für dieses Projekt und Datum suchen
            // Pfad-Struktur: bau-fotos/PROJEKTNAME/DATUM/
            const pfad = `${b.projekt_name}/${b.datum}`;
            const imgRes = await fetch(`${URL}/storage/v1/object/list/bau-fotos`, {
                method: 'POST',
                headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ prefix: pfad })
            });
            const bilder = await imgRes.json();

            let fotoHTML = "";
            if (bilder.length > 0) {
                fotoHTML = '<div style="display:flex; gap:10px; margin-top:10px; overflow-x:auto;">';
                bilder.forEach(img => {
                    const imgURL = `${URL}/storage/v1/object/public/bau-fotos/${pfad}/${img.name}`;
                    fotoHTML += `<img src="${imgURL}" style="width:120px; height:120px; object-fit:cover; border-radius:5px; cursor:pointer;" onclick="window.open('${imgURL}')">`;
                });
                fotoHTML += '</div>';
            }

            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding-bottom:5px;">
                    <strong>📍 ${b.projekt_name}</strong>
                    <span>📅 ${b.datum}</span>
                </div>
                <p style="margin:10px 0;"><strong>Stunden:</strong> ${b.arbeitsstunden}h | <strong>Mitarbeiter:</strong> ${b.mitarbeiter_liste}</p>
                <p><em>${b.bericht_text}</em></p>
                <p style="font-size:10px; color:#888;">GPS: ${b.gps_coords}</p>
                ${fotoHTML}
            `;
            galerie.appendChild(div);
        }
    } catch (e) {
        galerie.innerHTML = "❌ Fehler beim Laden: " + e.message;
    }
}
</script>
