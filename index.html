<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REF-Bau App | Direkt-Connect</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid #27ae60; }
        h2 { text-align: center; color: #2c3e50; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #status-box { font-size: 12px; padding: 10px; margin-bottom: 15px; border-radius: 6px; text-align: center; background: #d4edda; color: #155724; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div id="status-box">🚀 System bereit (Direkt-Modus)</div>
    <h2>🏗️ REF-Bau Login</h2>

    <div id="login-form">
        <input type="email" id="email" placeholder="E-Mail">
        <input type="password" id="pass" placeholder="Passwort">
        <button onclick="handleLogin()">ANMELDEN</button>
    </div>

    <div id="app-content" class="hidden">
        <h3 style="color: #27ae60; text-align: center;">✅ Login erfolgreich!</h3>
        <p style="text-align: center;">Datenbank-Verbindung steht.</p>
        <button onclick="location.reload()" style="background:#888;">Abmelden</button>
    </div>
</div>

<script>
    const URL = 'https://oqrkfeivpgqzgecbuzha.supabase.co'; 
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xcmtmZWl2cGdxemdlY2J1emhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2ODM1ODEsImV4cCI6MjA5MDI1OTU4MX0.Cue9gAHGEvnJTdF0ZLtYp0wGkCOnnxDheHBjmDhc3nA';

    async function handleLogin() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('pass').value;
        const statusBox = document.getElementById('status-box');

        statusBox.innerText = "⏳ Prüfe Login...";
        statusBox.style.background = "#fff3cd";

        try {
            // Wir senden die Login-Daten direkt an die Supabase API
            const response = await fetch(`${URL}/auth/v1/token?grant_type=password`, {
                method: 'POST',
                headers: {
                    'apikey': KEY,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password })
            });

            const result = await response.json();

            if (!response.ok) {
                throw new Error(result.error_description || result.error || "Login fehlgeschlagen");
            }

            // Erfolg!
            statusBox.innerText = "✅ Willkommen!";
            statusBox.style.background = "#d4edda";
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            
            console.log("Token erhalten:", result.access_token);

        } catch (e) {
            alert("Fehler: " + e.message);
            statusBox.innerText = "❌ " + e.message;
            statusBox.style.background = "#f8d7da";
        }
    }
</script>

</body>
</html>
