<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REF-BAU App</title>
    <!-- Wir laden die Werkzeuge von einem sehr stabilen Server -->
    <script src="https://unpkg.com"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg p-6 border-t-4 border-blue-900">
        <div class="text-3xl font-black text-blue-900 italic mb-6 border-b pb-4 text-center">REF-BAU</div>

        <!-- 1. LOGIN BEREICH -->
        <div id="loginSection" class="space-y-4">
            <h2 class="text-center font-bold text-gray-700 uppercase text-sm">Mitarbeiter Login</h2>
            <input type="email" id="email" placeholder="E-Mail" class="w-full border p-3 rounded shadow-sm">
            <input type="password" id="password" placeholder="Passwort" class="w-full border p-3 rounded shadow-sm">
            <button onclick="handleLogin()" id="btn" class="w-full bg-blue-900 text-white py-3 rounded font-bold uppercase shadow-lg">Anmelden</button>
            <p id="status" class="text-center text-[10px] font-bold text-gray-400 mt-2 uppercase tracking-widest">Warte auf Cloud...</p>
        </div>

        <!-- 2. BERICHTS BEREICH (Zuerst unsichtbar) -->
        <div id="appSection" class="hidden space-y-4">
            <div class="bg-green-100 text-green-800 p-2 rounded text-center text-xs font-bold uppercase">System Bereit ✅</div>
            <input type="text" id="project" placeholder="Baustelle Name" class="w-full border p-3 rounded">
            <input type="number" id="hours" step="0.5" placeholder="Stunden (z.B. 8.5)" class="w-full border p-3 rounded">
            <textarea id="work" rows="4" placeholder="Tätigkeiten..." class="w-full border p-3 rounded text-sm"></textarea>
            <button onclick="senden()" id="sendBtn" class="w-full bg-green-600 text-white py-4 rounded font-bold shadow-xl uppercase">Bericht Senden</button>
        </div>
    </div>

    <script>
        // === HIER DEINE DATEN EINTRAGEN ===
        const URL = 'https://hvvuzldppehewkotppdz.supabase.co'; 
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2dnV6bGRwcGVoZXdrb3RwcGR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MDgwOTYsImV4cCI6MjA5MDE4NDA5Nn0.KJXLoRLvPd7mRoQu9lTRhuxdwAwUhXov9kbwGkVhV_M';
        
        let sb;

        // Versuche die Verbindung sofort aufzubauen
        window.onload = function() {
            const status = document.getElementById('status');
            try {
                if (typeof supabase === 'undefined') {
                    status.innerText = "FEHLER: BIBLIOTHEK NICHT GELADEN!";
                    status.classList.add('text-red-600');
                } else {
                    sb = supabase.createClient(URL, KEY);
                    status.innerText = "Bereit für Login ✅";
                    status.classList.add('text-green-600');
                }
            } catch (e) {
                status.innerText = "VERBINDUNGSFEHLER!";
            }
        };

        async function handleLogin() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            const btn = document.getElementById('btn');
            btn.innerText = "PRÜFE..."; btn.disabled = true;

            try {
                const { error } = await sb.auth.signInWithPassword({ email: e, password: p });
                if (error) throw error;
                
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('appSection').classList.remove('hidden');
            } catch (err) {
                alert("Fehler: " + err.message);
                btn.innerText = "ANMELDEN"; btn.disabled = false;
            }
        }

        async function senden() {
            const btn = document.getElementById('sendBtn');
            const project = document.getElementById('project').value;
            if(!project) { alert("Projektname fehlt!"); return; }
            btn.disabled = true; btn.innerText = "SENDE...";

            const { error } = await sb.from('berichte').insert([
                { 
                    projekt: project, 
                    stunden: parseFloat(document.getElementById('hours').value) || 0,
                    arbeit_text: document.getElementById('work').value,
                    datum: new Date().toISOString().split('T')[0]
                }
            ]);

            if (error) {
                alert("Fehler beim Senden: " + error.message);
            } else {
                alert("Erfolgreich an REF-BAU gesendet!");
                location.reload();
            }
            btn.disabled = false;
        }
    </script>
</body>
</html>
