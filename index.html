<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>REF-Bau App Fix</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; background: #f0f0f0; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>🏗️ REF-Bau Login</h2>
    
    <!-- Test Button -->
    <button onclick="alert('HTML Verbindung OK!')" style="background: #3498db;">1. Klick-Test (Muss Pop-up zeigen)</button>

    <div id="login-area">
        <input type="email" id="email" placeholder="E-Mail">
        <input type="password" id="password" placeholder="Passwort">
        <button onclick="jetztAnmelden()">2. ANMELDEN</button>
    </div>

    <div id="app-area" class="hidden">
        <h3>✅ Login erfolgreich!</h3>
        <p>Du bist jetzt im Hauptmenü.</p>
        <button onclick="location.reload()">Abmelden</button>
    </div>

    <div id="debug-log" style="font-size: 10px; color: red; margin-top: 20px;"></div>
</div>

<script>
    // --- 1. DATEN EINTRAGEN ---
    const URL = 'https://oqrkfeivpgqzgecbuzha.supabase.co'; // https://xyz.supabase.co
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xcmtmZWl2cGdxemdlY2J1emhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2ODM1ODEsImV4cCI6MjA5MDI1OTU4MX0.Cue9gAHGEvnJTdF0ZLtYp0wGkCOnnxDheHBjmDhc3nA';

    // Client initialisieren
    const supabaseClient = supabase.createClient(URL, KEY);

    async function jetztAnmelden() {
        const log = document.getElementById('debug-log');
        const mail = document.getElementById('email').value;
        const pass = document.getElementById('password').value;

        console.log("Versuche Login für:", mail);
        log.innerText = "Sende Daten an Supabase...";

        try {
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: mail.trim(),
                password: pass
            });

            if (error) {
                alert("Supabase sagt: " + error.message);
                log.innerText = "Fehler: " + error.message;
            } else {
                alert("Erfolg! Willkommen.");
                document.getElementById('login-area').classList.add('hidden');
                document.getElementById('app-area').classList.remove('hidden');
                log.innerText = "";
            }
        } catch (err) {
            alert("Script Fehler: " + err.message);
            log.innerText = "Script Fehler: " + err.message;
        }
    }
</script>
</body>
</html>
