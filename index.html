<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REF-BAU App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Wichtig: Die Supabase Bibliothek -->
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="https://cdnjs.cloudflare.com"></script>
</head>
<body class="bg-gray-100 p-4 pb-10">

    <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg p-6">
        <!-- HEADER -->
        <div class="flex items-center justify-between mb-6 border-b pb-4">
            <div class="text-3xl font-extrabold text-blue-900 italic tracking-tighter">REF-BAU</div>
            <div class="text-[10px] text-gray-400 text-right uppercase font-bold leading-tight">Digitale<br>Bauleitung</div>
        </div>

        <!-- 1. LOGIN BEREICH -->
        <div id="loginSection" class="space-y-4">
            <h2 class="text-lg font-bold text-gray-700 text-center">Mitarbeiter Login</h2>
            <input type="email" id="loginEmail" placeholder="E-Mail (@ref-bau.de)" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-900 outline-none">
            <input type="password" id="loginPassword" placeholder="Passwort" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-900 outline-none">
            <button onclick="handleLogin()" id="loginBtn" class="w-full bg-blue-900 text-white py-3 rounded-lg font-bold shadow-md hover:bg-blue-800 transition">Anmelden</button>
        </div>

        <!-- 2. HAUPT APP (Wird nach Login sichtbar) -->
        <div id="appSection" class="hidden space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Projekt</label>
                    <input type="text" id="project" class="w-full border p-2 rounded" placeholder="Baustelle">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Datum</label>
                    <input type="date" id="date" class="w-full border p-2 rounded">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Stunden</label>
                    <input type="number" id="hours" step="0.5" class="w-full border p-2 rounded" placeholder="z.B. 8.5">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Wetter</label>
                    <select id="weather" class="w-full border p-2 rounded">
                        <option>Sonnig</option><option>Bewölkt</option><option>Regen</option><option>Frost</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Tätigkeiten</label>
                <textarea id="work" rows="4" class="w-full border p-2 rounded text-sm" placeholder="Was wurde heute gemacht?"></textarea>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Unterschrift</label>
                <canvas id="sig-canvas" width="350" height="120" class="border-2 border-dashed border-gray-300 w-full bg-gray-50 rounded touch-none"></canvas>
                <button onclick="clearSig()" class="text-[10px] text-red-500 underline mt-1">Löschen</button>
            </div>

            <button onclick="saveAndSend()" id="sendBtn" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-green-700 transition uppercase">
                Bericht an Zentrale senden
            </button>
            <p id="status" class="text-center text-xs mt-2 font-bold text-blue-700"></p>
            
            <button onclick="handleLogout()" class="w-full text-xs text-gray-400 mt-10 underline text-center">Abmelden</button>
        </div>
    </div>

    <script>
        // === 1. ZUERST INITIALISIEREN (MIT sb STATT supabase) ===
        const SUPABASE_URL = 'https://hvvuzldppehewkotppdz.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2dnV6bGRwcGVoZXdrb3RwcGR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MDgwOTYsImV4cCI6MjA5MDE4NDA5Nn0.KJXLoRLvPd7mRoQu9lTRhuxdwAwUhXov9kbwGkVhV_M';
        
        // Wichtig: Wir nennen die Verbindung 'sb' um Konflikte mit der Library zu vermeiden
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const loginSection = document.getElementById('loginSection');
        const appSection = document.getElementById('appSection');

        // LOGIN FUNKTION
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            btn.innerText = "Prüfe...";
            btn.disabled = true;

            try {
                const { data, error } = await sb.auth.signInWithPassword({ email, password });
                if (error) throw error;
                checkSession();
            } catch (err) {
                alert("Login-Fehler: " + err.message);
                btn.innerText = "Anmelden";
                btn.disabled = false;
            }
        }

        async function handleLogout() {
            await sb.auth.signOut();
            location.reload();
        }

        async function checkSession() {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                loginSection.classList.add('hidden');
                appSection.classList.remove('hidden');
                document.getElementById('date').valueAsDate = new Date();
            }
        }

        // UNTERSCHRIFT
        const canvas = document.getElementById('sig-canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        canvas.addEventListener('touchstart', (e) => { drawing = true; draw(e); }, {passive: false});
        canvas.addEventListener('touchend', () => { drawing = false; ctx.beginPath(); });
        canvas.addEventListener('touchmove', (e) => draw(e), {passive: false});
        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
        canvas.addEventListener('mousemove', draw);

        function draw(e) {
            if (!drawing) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
            ctx.lineWidth = 2; ctx.lineCap = "round"; ctx.lineTo(x, y); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x, y);
        }
        function clearSig() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        // DATEN SENDEN
        async function saveAndSend() {
            const btn = document.getElementById('sendBtn');
            const status = document.getElementById('status');
            btn.disabled = true;
            status.innerText = "Sende an Zentrale...";

            const reportData = {
                projekt: document.getElementById('project').value,
                datum: document.getElementById('date').value,
                stunden: parseFloat(document.getElementById('hours').value) || 0,
                arbeit_text: document.getElementById('work').value,
                wetter: document.getElementById('weather').value
            };

            try {
                const { error } = await sb.from('berichte').insert([reportData]);
                if (error) throw error;
                
                status.innerText = "Erfolgreich! Erzeuge PDF...";
                generatePDF(reportData);
                alert("Bericht gespeichert!");
            } catch (err) {
                alert("Fehler beim Senden: " + err.message);
            } finally {
                btn.disabled = false;
                status.innerText = "";
            }
        }

        function generatePDF(data) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("REF-BAU TAGESBERICHT", 20, 20);
            doc.text(`Projekt: ${data.projekt}`, 20, 40);
            doc.text(`Datum: ${data.datum}`, 20, 50);
            doc.text(`Stunden: ${data.stunden}`, 20, 60);
            doc.text(`Arbeiten: ${data.arbeit_text}`, 20, 70);
            doc.addImage(canvas.toDataURL("image/png"), 'PNG', 20, 100, 70, 25);
            doc.save(`REF_Bericht_${data.projekt}.pdf`);
        }

        window.onload = checkSession;
    </script>
</body>
</html>
