<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REF-Bau App | Tagesbericht</title>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; padding: 20px; max-width: 500px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; }
        label { display: block; margin-top: 15; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 5px; margin-top: 20px; cursor: pointer; font-size: 16px; }
        button:hover { background: #219150; }
        #status { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>🏗️ REF-Bau Tagesbericht</h2>
    
    <label>Projektname</label>
    <select id="projekt">
        <option>Lade Projekte...</option>
    </select>

    <label>Arbeitsstunden</label>
    <input type="number" id="stunden" value="8.5" step="0.5">

    <label>Tätigkeiten / Vorkommnisse</label>
    <textarea id="bericht" rows="4" placeholder="Was wurde heute gemacht?"></textarea>

    <label>Bilder hochladen</label>
    <input type="file" id="bilder" multiple accept="image/*">

    <button onclick="senden()">Bericht Absenden</button>
    <div id="status"></div>
</div>

<script>
    // --- KONFIGURATION ---
    const SUPABASE_URL = 'https://hvvuzldppehewkotppdz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2dnV6bGRwcGVoZXdrb3RwcGR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MDgwOTYsImV4cCI6MjA5MDE4NDA5Nn0.KJXLoRLvPd7mRoQu9lTRhuxdwAwUhXov9kbwGkVhV_M';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 1. Projekte beim Start laden
    async function loadProjekte() {
        const { data, error } = await supabase.table('projekte').select('name');
        const select = document.getElementById('projekt');
        select.innerHTML = ""; // Clear
        if (data) {
            data.forEach(p => {
                let opt = document.createElement('option');
                opt.value = p.name;
                opt.innerHTML = p.name;
                select.appendChild(opt);
            });
        }
    }
    loadProjekte();

    // 2. Bericht absenden
    async function senden() {
        const statusDiv = document.getElementById('status');
        statusDiv.innerHTML = "⌛ Sende Daten...";
        
        const projekt = document.getElementById('projekt').value;
        const stunden = document.getElementById('stunden').value;
        const bericht = document.getElementById('bericht').value;
        const bilder = document.getElementById('bilder').files;

        // Daten in Tabelle 'tagesberichte' speichern
        const { data, error } = await supabase
            .from('tagesberichte')
            .insert([{ 
                projekt_name: projekt, 
                arbeitsstunden: stunden, 
                bericht_text: bericht,
                erstellt_am: new Date()
            }])
            .select();

        if (error) {
            statusDiv.innerHTML = "❌ Fehler: " + error.message;
            statusDiv.style.color = "red";
        } else {
            statusDiv.innerHTML = "✅ Bericht gespeichert!";
            statusDiv.style.color = "green";
            // Hier würde jetzt die Logik für den Bilder-Upload folgen (Supabase Storage)
        }
    }
</script>

</body>
</html>
