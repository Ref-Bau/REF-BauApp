<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REF-BAU App</title>
    <!-- WERKZEUGE -->
    <script src="https://unpkg.com"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com"></script>
</head>
<body class="bg-gray-100 p-4 pb-10 font-sans">

    <div class="max-w-md mx-auto bg-white rounded-xl shadow-2xl p-6 border-t-4 border-blue-900">
        <!-- LOGO -->
        <div class="flex items-center justify-between mb-6 border-b pb-4">
            <div class="text-3xl font-black text-blue-900 italic tracking-tighter">REF-BAU</div>
            <div class="text-[10px] text-gray-400 text-right uppercase font-bold leading-tight">Digitale<br>Bauleitung</div>
        </div>

        <!-- STATUS BOX -->
        <div id="statusIndicator" class="mb-4 p-3 rounded text-center text-[10px] font-bold uppercase tracking-widest bg-yellow-100 text-yellow-700">
            Verbindung wird gesucht...
        </div>

        <!-- 1. LOGIN BEREICH -->
        <div id="loginSection" class="hidden space-y-4">
            <h2 class="text-center font-bold text-gray-700 uppercase tracking-widest text-sm">Mitarbeiter Login</h2>
            <input type="email" id="loginEmail" placeholder="E-Mail" class="w-full border-2 p-3 rounded-lg outline-none focus:border-blue-900 shadow-sm">
            <input type="password" id="loginPassword" placeholder="Passwort" class="w-full border-2 p-3 rounded-lg outline-none focus:border-blue-900 shadow-sm">
            <button onclick="handleLogin()" id="loginBtn" class="w-full bg-blue-900 text-white py-4 rounded-xl font-bold shadow-lg active:scale-95 transition tracking-widest uppercase">Anmelden</button>
        </div>

        <!-- 2. HAUPT APP -->
        <div id="appSection" class="hidden space-y-4 animate-fade-in">
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="project" class="border p-2 rounded shadow-inner" placeholder="Baustelle">
                <input type="date" id="date" class="border p-2 rounded shadow-inner">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <input type="number" id="hours" step="0.5" class="border p-2 rounded shadow-inner" placeholder="Stunden">
                <select id="weather" class="border p-2 rounded shadow-inner">
                    <option>Sonnig</option><option>Bewölkt</option><option>Regen</option><option>Frost</option>
                </select>
            </div>

            <textarea id="work" rows="4" class="w-full border p-2 rounded text-sm shadow-inner" placeholder="Was wurde heute erledigt?"></textarea>

            <div class="relative bg-gray-50 border-2 border-dashed border-gray-300 rounded overflow-hidden">
                <canvas id="sig-canvas" width="350" height="120" class="w-full touch-none cursor-crosshair"></canvas>
                <button onclick="clearSig()" class="absolute top-1 right-1 text-[10px] bg-red-500 text-white px-2 py-1 rounded shadow">Löschen</button>
            </div>

            <button onclick="saveAndSend()" id="sendBtn" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold shadow-xl hover:bg-green-700 transition uppercase tracking-widest">
                Bericht senden 🏗️
            </button>
            
            <button onclick="handleLogout()" class="w-full text-xs text-gray-400 mt-6 underline text-center">Abmelden</button>
        </div>
    </div>

    <script>
        // === ZUGANGSDATEN (HIER EINTRAGEN!) ===
        const SUPABASE_URL = 'https://hvvuzldppehewkotppdz.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2dnV6bGRwcGVoZXdrb3RwcGR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MDgwOTYsImV4cCI6MjA5MDE4NDA5Nn0.KJXLoRLvPd7mRoQu9lTRhuxdwAwUhXov9kbwGkVhV_M';
        
        let sb = null;

        // Startet alles, sobald die Seite geladen ist
        window.onload = async function() {
            const indicator = document.getElementById('statusIndicator');
            try {
                // 1. Initialisierung
                sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                
                // 2. Test der Verbindung (Session abrufen)
                const { error } = await sb.auth.getSession();
                
                if (error) {
                    indicator.innerText = "FEHLER: " + error.message;
                    indicator.className = "mb-4 p-3 rounded text-center text-[10px] font-bold uppercase bg-red-100 text-red-700";
                } else {
                    indicator.innerText = "System bereit ✅";
                    indicator.className = "mb-4 p-3 rounded text-center text-[10px] font-bold uppercase bg-green-100 text-green-700";
                    document.getElementById('loginSection').classList.remove('hidden');
                    initSignature();
                    checkSession();
                    if(document.getElementById('date')) document.getElementById('date').valueAsDate = new Date();
                }
            } catch (err) {
                indicator.innerText = "NETZWERK-BLOCKADE!";
                console.error(err);
            }
        };

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            btn.innerText = "PRÜFE..."; btn.disabled = true;

            try {
                const { error } = await sb.auth.signInWithPassword({ email, password });
                if (error) throw error;
                await checkSession();
            } catch (err) {
                alert("Login fehlgeschlagen: " + err.message);
                btn.innerText = "ANMELDEN"; btn.disabled = false;
            }
        }

        async function checkSession() {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('statusIndicator').classList.add('hidden');
                document.getElementById('appSection').classList.remove('hidden');
            }
        }

        async function handleLogout() {
            await sb.auth.signOut();
            location.reload();
        }

        // UNTERSCHRIFT
        let canvas, ctx, drawing = false;
        function initSignature() {
            canvas = document.getElementById('sig-canvas');
            ctx = canvas.getContext('2d');
            canvas.addEventListener('mousedown', () => drawing = true);
            canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('touchstart', (e) => { drawing = true; draw(e); }, {passive: false});
            canvas.addEventListener('touchend', () => { drawing = false; ctx.beginPath(); });
            canvas.addEventListener('touchmove', (e) => draw(e), {passive: false});
        }
        function draw(e) {
            if (!drawing) return; e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches.clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches.clientY)) - rect.top;
            ctx.lineWidth = 2; ctx.lineCap = "round"; ctx.lineTo(x, y); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x, y);
        }
        function clearSig() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        async function saveAndSend() {
            const btn = document.getElementById('sendBtn');
            const project = document.getElementById('project').value;
            if(!project) { alert("Projektname fehlt!"); return; }
            btn.disabled = true;

            const reportData = {
                projekt: project,
                datum: document.getElementById('date').value,
                stunden: parseFloat(document.getElementById('hours').value) || 0,
                arbeit_text: document.getElementById('work').value,
                wetter: document.getElementById('weather').value
            };

            try {
                const { error } = await sb.from('berichte').insert([reportData]);
                if (error) throw error;
                
                generatePDF(reportData);
                alert("Bericht erfolgreich an REF-BAU gesendet!");
            } catch (err) {
                alert("Fehler: " + err.message);
            } finally {
                btn.disabled = false;
            }
        }

        function generatePDF(data) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("REF-BAU TAGESBERICHT", 20, 20);
            doc.text(`Projekt: ${data.projekt}`, 20, 40);
            doc.text(`Datum: ${data.datum}`, 20, 50);
            const sig = canvas.toDataURL("image/png");
            doc.addImage(sig, 'PNG', 20, 100, 60, 20);
            doc.save(`REF-BAU_${data.projekt}.pdf`);
        }
    </script>
</body>
</html>
